<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DineReview Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet" />

    <style>
        /* 1. Base Body Styles (Centered form, dark theme) */
        body {
            background-color: #733B32;
            /* Dark brown color from Hero Section */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 2. Main content wrapper for limiting form width */
        .signup-container {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            border-radius: 8px;
        }

        /* 3. Input field styling */
        .form-control-custom {
            background-color: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            height: 50px;
            border-radius: 5px;
            padding: 10px 15px;
            font-size: 1.1rem;
        }

        .form-control-custom::placeholder {
            color: rgba(255, 255, 255, 0.6);
            opacity: 1;
        }

        .form-control-custom:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.25);
        }

        /* 4. Password Toggle Button Styling */
        .toggle-password {
            background-color: transparent;
            border: 1px solid #ffffff !important;
            color: #ffffff !important;
            border-left: none !important;
            /* Visual cleanup */
        }

        /* 5. Custom Button Styles (Share Now - Black) */
        .btn-share-now {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.1rem;
        }

        .btn-share-now:hover {
            background-color: #000000;
            border-color: #000000;
        }

        /* 6. Custom Button Styles (Connect with Google - Outline) */
        .btn-connect-google {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-connect-google:hover {
            background-color: #733B32;
            border-color: #ffffff;
        }

        /* 7. Header/Link Styling */
        .top-link {
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container signup-container">

        <!-- <header class="d-flex justify-content-between mb-5">
            <h1 class="fw-bold" style="font-size: 1.5rem;">Zwigato</h1>
            <a href="#" class="top-link align-self-end">Taste truth</a>
        </header> -->

        <div class="text-center">
            <h2 class="fw-bold mb-3">Log In</h2>
            <p class="mb-5" style="font-size: 1.1rem; color: rgba(255, 255, 255, 0.8);">
                Uncover the raw flavors behind every restaurant experience
            </p>
        </div>

        <form action="auth/login.php" method="POST">

            <div class="mb-4">
                <label for="email" class="form-label">Email*</label>
                <input type="email" id="email" name="email" class="form-control form-control-custom" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password*</label>
                <div class="input-group">
                    <input type="password" id="password" name="password" class="form-control form-control-custom"
                        required>

                    <button class="btn btn-outline-light toggle-password" type="button" id="togglePassword"
                        style="border-radius: 0 5px 5px 0;">
                        🔒
                    </button>
                </div>
            </div>
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-share-now">Log In</button>
            </div>

            <div class="d-grid mb-5">
                <button type="button" class="btn btn-connect-google">
                    <img src="assets/google-logo.png" alt="Google Logo"
                        style="width: 24px; height: 24px; margin-right: 8px;">
                    Connect with Google
                </button>
            </div>

            <!-- <p class="text-center">
                <a href="login.html" class="top-link" style="text-decoration: underline;">Already a food critic? Log in here</a>
            </p> -->

            <p class="text-center" style="font-size: 0.8rem; margin-top: 30px;" id="current-date">
            </p>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Get the button and the input field
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function (e) {
                // Toggle the type attribute between 'password' and 'text'
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
            });
        }
    </script>

    <script>
        function updateDate() {
            const today = new Date();
            const options = {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            };
            const formattedDate = today.toLocaleDateString('en-GB', options);

            const dateElement = document.getElementById('current-date');
            if (dateElement) {
                dateElement.textContent = formattedDate;
            }
        }
        updateDate();
    </script>
</body>

</html>
