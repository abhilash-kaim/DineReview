<!DOCTYPE html>
<html lang="en">

<head>
    <title>DineReview Sign Up</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #733B32;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-container {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .form-control-custom {
            background-color: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            height: 50px;
        }

        .form-control-custom::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-signup {
            background-color: #000;
            color: #fff;
            padding: 12px;
            font-weight: bold;
            border: none;
        }

        .btn-signup:hover {
            background-color: #000;
        }
    </style>
</head>

<body>

    <div class="signup-container">
        <h2 class="text-center mb-4">Create Account</h2>

        <form action="auth/register.php" method="POST">

            <div class="mb-3">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" class="form-control form-control-custom" required>
            </div>

            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control form-control-custom" required>
            </div>

            <div class="mb-4">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control form-control-custom" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-signup">Sign Up</button>
            </div>

            <p class="text-center mt-4">
                Already have an account?
                <a href="login.html" style="color:white; text-decoration:underline;">Login</a>
            </p>

        </form>
    </div>

</body>

</html>
